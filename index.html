<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="theme-color" content="#09090b"/><link rel="apple-touch-icon" href="apple-touch-icon.png?v=2"/><link rel="icon" type="image/png" href="apple-touch-icon.png?v=2"/><link rel="shortcut icon" type="image/png" href="apple-touch-icon.png?v=2"/><title>In-Tray Tracker</title><style>
:root{--bg:#09090b;--card:#18181b;--text:#f4f4f5;--muted:#a1a1aa;--border:#2f2f35;--good:#166534;--warning:#854d0e;--overdue:#7f1d1d;--good-text:#dcfce7;--warning-text:#fef3c7;--overdue-text:#fee2e2;--accent:#f4f4f5;--accent-text:#09090b;--shadow:0 4px 14px rgba(0,0,0,.35);--radius:16px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.25}.wrap{max-width:900px;margin:0 auto;padding:12px 8px 34px}.top{position:sticky;top:0;z-index:10;padding:14px 0 8px;background:rgba(9,9,11,.92);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid rgba(255,255,255,.06);text-align:center}h1{margin:0;width:100%;font-size:2.35rem;font-weight:900;letter-spacing:-.045em;line-height:1;text-align:center}.sub{color:var(--muted);margin:8px auto 0;font-size:.9rem;text-align:center;max-width:340px;line-height:1.3}.top.compact h1{font-size:1.05rem;letter-spacing:-.01em}.top.compact .sub{display:none}.toolbar,.form,.stats,.backup{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);margin:8px 0}.toolbar,.stats,.backup{padding:6px}.toolbar-row{display:grid;gap:6px;grid-template-columns:1fr 156px 64px}.backup-row{display:grid;gap:8px;grid-template-columns:1fr 1fr}.form{padding:10px}.form-grid{display:grid;gap:8px;grid-template-columns:2fr 1.1fr 1fr}.field{display:flex;flex-direction:column;gap:5px}label{font-size:.8rem;color:var(--muted);font-weight:700}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;padding:10px 8px;border:1px solid var(--border);border-radius:12px;background:#0f0f12;color:var(--text);min-height:40px}textarea{min-height:70px;resize:vertical}button{border:0;border-radius:12px;min-height:40px;padding:9px 10px;cursor:pointer;background:var(--accent);color:var(--accent-text);font-weight:750}button.secondary{background:#0f0f12;color:var(--text);border:1px solid var(--border)}button.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}button.small{min-height:34px;padding:7px 9px;font-size:.88rem;border-radius:11px;flex:1}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:end}.stats{display:grid;gap:5px;grid-template-columns:repeat(4,1fr)}.stat{padding:5px 2px;border-radius:10px;border:1px solid rgba(255,255,255,.08);text-align:center;font-weight:800;font-size:.7rem;white-space:nowrap}.stat.total{background:#27272a;color:#e4e4e7}.stat.good{background:var(--good);color:var(--good-text)}.stat.warning{background:var(--warning);color:var(--warning-text)}.stat.overdue{background:var(--overdue);color:var(--overdue-text)}.list{display:grid;gap:7px;margin-top:8px}.empty{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);padding:22px 14px;text-align:center;color:var(--muted)}.card,.compact-card{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:16px;overflow:hidden}.swipe-wrap{position:relative;border-radius:16px;overflow:hidden}.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;font-weight:900;font-size:.86rem;color:#fff;pointer-events:none}.swipe-bg-left{height:100%;display:flex;align-items:center;padding-left:14px;background:#0f766e;width:50%}.swipe-bg-right{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:14px;background:#15803d;width:50%;margin-left:auto}.status-good{background:linear-gradient(to right,var(--good),rgba(24,24,27,.9) 88%)}.status-warning{background:linear-gradient(to right,var(--warning),rgba(24,24,27,.9) 88%)}.status-overdue{background:linear-gradient(to right,var(--overdue),rgba(24,24,27,.9) 88%)}.compact-card,.swipe-card{position:relative;z-index:1;touch-action:pan-y;user-select:none;transition:transform .12s ease}.compact-card{padding:9px 10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.compact-title{font-size:1rem;font-weight:850;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.swipe-hint{font-size:.68rem;color:var(--muted);grid-column:1 / -1;margin-top:-3px}.card-top{padding:10px 10px 7px;display:grid;gap:7px}.card-toggle{cursor:pointer}.title-row{display:flex;gap:8px;align-items:center;justify-content:space-between}.title{font-size:1.02rem;font-weight:850;letter-spacing:-.01em}.badge{white-space:nowrap;font-size:.76rem;font-weight:850;padding:5px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.28)}.badge.good{color:var(--good-text)}.badge.warning{color:var(--warning-text)}.badge.overdue{color:var(--overdue-text)}.meta{display:grid;gap:4px;font-size:.88rem}.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:center;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:6px 8px}.meta-label{color:var(--muted);font-size:.77rem;font-weight:800}.meta-value{text-align:right;font-weight:650;color:var(--text);overflow-wrap:anywhere}.notes{color:#d4d4d8;font-size:.88rem;white-space:pre-wrap;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:7px 8px}.card-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:0 10px 10px}.footer-note{margin-top:12px;font-size:.82rem;color:var(--muted);text-align:center}.danger{color:#fca5a5}.hidden{display:none!important}@media(max-width:380px){.toolbar-row{grid-template-columns:1fr 144px 58px}.toolbar-row input,.toolbar-row select,.toolbar-row button{font-size:.78rem;padding-left:6px;padding-right:6px}.stat{font-size:.64rem}.swipe-hint{display:none}.backup-row{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}h1{font-size:2.05rem}}
</style></head><body><div class="wrap"><div class="top" id="topHeader"><h1>In-Tray Tracker</h1><p class="sub">Track when each in-tray was fully cleared, what needs attention, and what is overdue.</p></div><div class="toolbar"><div class="toolbar-row"><input id="searchInput" type="text" placeholder="Search"/><select id="filterStatus"><option value="all">All</option><option value="good">Good</option><option value="warning">Needs Attention</option><option value="overdue">Overdue</option></select><button id="toggleFormBtn">Add</button></div></div><div class="backup"><div class="backup-row"><button id="exportBtn" class="secondary">Export Backup</button><button id="importBtn" class="secondary">Import Backup</button><input id="importFile" class="hidden" type="file" accept="application/json,.json"/></div></div><div class="form hidden" id="formWrap"><div class="form-grid"><div class="field"><label for="nameInput">In-tray name</label><input id="nameInput" type="text" placeholder="Example: Personal email" maxlength="80"/></div><div class="field"><label for="cadenceNumberInput">Cadence number</label><input id="cadenceNumberInput" type="number" min="1" step="1" value="1"/></div><div class="field"><label for="cadenceUnitInput">Cadence unit</label><select id="cadenceUnitInput"><option value="days">Days</option><option value="weeks">Weeks</option><option value="months" selected>Months</option><option value="years">Years</option></select></div></div><div class="field" style="margin-top:8px;"><label for="notesInput">Notes (optional)</label><textarea id="notesInput" placeholder="Anything helpful to remember about this in-tray"></textarea></div><div class="actions" style="margin-top:8px;"><button id="saveBtn">Save in-tray</button><button id="deleteEditBtn" class="ghost danger hidden">Delete</button><button id="cancelBtn" class="secondary">Cancel</button></div></div><div class="stats" id="stats"></div><div class="list" id="list"></div><div class="footer-note">Tap an in-tray to expand/collapse. Swipe left = Fully cleared. Swipe right = Worked on.</div></div><script>
const STORAGE_KEY='in-tray-tracker-v1';const els={topHeader:document.getElementById('topHeader'),list:document.getElementById('list'),stats:document.getElementById('stats'),searchInput:document.getElementById('searchInput'),filterStatus:document.getElementById('filterStatus'),toggleFormBtn:document.getElementById('toggleFormBtn'),formWrap:document.getElementById('formWrap'),nameInput:document.getElementById('nameInput'),cadenceNumberInput:document.getElementById('cadenceNumberInput'),cadenceUnitInput:document.getElementById('cadenceUnitInput'),notesInput:document.getElementById('notesInput'),saveBtn:document.getElementById('saveBtn'),cancelBtn:document.getElementById('cancelBtn'),deleteEditBtn:document.getElementById('deleteEditBtn'),exportBtn:document.getElementById('exportBtn'),importBtn:document.getElementById('importBtn'),importFile:document.getElementById('importFile')};let intrays=load();let editingId=null;let expandedId=null;if(!intrays.length){intrays=seedData();persist()}function seedData(){return[makeIntray('Personal email',1,'days','Clear inbox to zero or close to zero.'),makeIntray('Work email',1,'days','Process messages and next actions.'),makeIntray('Physical papers',1,'weeks','Sort, discard, file, or act.'),makeIntray('Downloads folder',1,'months','Rename, file, delete, or act.')]}function makeIntray(name,cadenceNumber,cadenceUnit,notes=''){return{id:cryptoRandomId(),name,notes,cadenceNumber,cadenceUnit,createdAt:new Date().toISOString(),lastClearedAt:null,lastWorkedOnAt:null}}function cryptoRandomId(){return'i_'+Math.random().toString(36).slice(2,11)}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):[]}catch{return[]}}function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify(intrays))}function nowISO(){return new Date().toISOString()}function unitToDays(unit){switch(unit){case'days':return 1;case'weeks':return 7;case'months':return 30.44;case'years':return 365.25;default:return 1}}function cadenceDays(item){return item.cadenceNumber*unitToDays(item.cadenceUnit)}function daysSince(iso){if(!iso)return null;return Math.max(0,(Date.now()-new Date(iso).getTime())/86400000)}function getStatus(item){if(!item.lastClearedAt)return'overdue';const elapsed=daysSince(item.lastClearedAt),target=cadenceDays(item);if(elapsed<=target)return'good';if(elapsed<=target*2)return'warning';return'overdue'}function statusLabel(status,item){if(!item.lastClearedAt)return'Never cleared';if(status==='good')return'Good';if(status==='warning')return'Needs Attention';return'Overdue'}function formatDateTime(iso){if(!iso)return'Not yet';return new Date(iso).toLocaleString([],{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}function formatCadence(item){const n=item.cadenceNumber,u=item.cadenceUnit,singular=u.endsWith('s')?u.slice(0,-1):u;return`Every ${n} ${n===1?singular:u}`}function activityTime(item){return new Date(item.lastWorkedOnAt||item.lastClearedAt||item.createdAt||0).getTime()}function sortIntrays(items){const priority={overdue:0,warning:1,good:2};return[...items].sort((a,b)=>{const sa=getStatus(a),sb=getStatus(b);if(priority[sa]!==priority[sb])return priority[sa]-priority[sb];const act=activityTime(a),bct=activityTime(b);if(act!==bct)return act-bct;return a.name.localeCompare(b.name)})}function filteredIntrays(){const q=els.searchInput.value.trim().toLowerCase(),statusFilter=els.filterStatus.value;return sortIntrays(intrays).filter(item=>{const text=[item.name,item.notes].join(' ').toLowerCase(),status=getStatus(item);return(!q||text.includes(q))&&(statusFilter==='all'||status===statusFilter)})}function renderStats(){const counts={total:intrays.length,good:0,warning:0,overdue:0};for(const item of intrays)counts[getStatus(item)]++;els.stats.innerHTML=`<div class="stat total">${counts.total} Total</div><div class="stat good">${counts.good} Good</div><div class="stat warning">${counts.warning} Needs Attention</div><div class="stat overdue">${counts.overdue} Overdue</div>`}function render(){renderStats();const items=filteredIntrays();if(!items.length){els.list.innerHTML=`<div class="empty">No in-trays match your current filter.</div>`;return}els.list.innerHTML=items.map(item=>item.id===expandedId?expandedCard(item):compactCard(item)).join('');attachHandlers()}function swipeBg(){return`<div class="swipe-bg"><div class="swipe-bg-left">Worked on</div><div class="swipe-bg-right">Fully cleared</div></div>`}function compactCard(item){const status=getStatus(item),statusText=statusLabel(status,item);return`<div class="swipe-wrap">${swipeBg()}<div class="compact-card swipe-card status-${status}" data-id="${item.id}"><div class="compact-title">${escapeHtml(item.name)}</div><div class="badge ${status}">${statusText}</div><div class="swipe-hint">Tap to expand • ← Fully cleared • Worked on →</div></div></div>`}function expandedCard(item){const status=getStatus(item),statusText=statusLabel(status,item),elapsed=item.lastClearedAt?Math.floor(daysSince(item.lastClearedAt)):'—';return`<div class="swipe-wrap">${swipeBg()}<div class="card swipe-card status-${status}" data-id="${item.id}"><div class="card-toggle" data-id="${item.id}"><div class="card-top"><div class="title-row"><div class="title">${escapeHtml(item.name)}</div><div class="badge ${status}">${statusText}</div></div><div class="meta"><div class="meta-row"><div class="meta-label">Cadence</div><div class="meta-value">${formatCadence(item)}</div></div><div class="meta-row"><div class="meta-label">Days since full clear</div><div class="meta-value">${elapsed}</div></div><div class="meta-row"><div class="meta-label">Last fully cleared</div><div class="meta-value">${formatDateTime(item.lastClearedAt)}</div></div><div class="meta-row"><div class="meta-label">Last worked on</div><div class="meta-value">${formatDateTime(item.lastWorkedOnAt)}</div></div></div>${item.notes?`<div class="notes">${escapeHtml(item.notes)}</div>`:``}</div></div><div class="card-actions"><button class="small" onclick="markCleared('${item.id}')">Fully cleared</button><button class="small secondary" onclick="markWorkedOn('${item.id}')">Worked on</button><button class="small secondary" onclick="startEdit('${item.id}')">Edit</button></div></div></div>`}function attachHandlers(){document.querySelectorAll('.swipe-card').forEach(card=>{let startX=0,startY=0,moved=false;card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;moved=false},{passive:true});card.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;if(Math.abs(dx)>20&&Math.abs(dx)>Math.abs(dy)){moved=true;card.style.transform=`translateX(${Math.max(-120,Math.min(120,dx))}px)`}},{passive:true});card.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-startX;card.style.transform='';const id=card.dataset.id;if(dx<-85){markCleared(id);return}if(dx>85){markWorkedOn(id);return}if(card.classList.contains('compact-card')&&(!moved||Math.abs(dx)<20)){expandedId=expandedId===id?null:id;render()}});card.addEventListener('click',()=>{if(card.classList.contains('compact-card')){const id=card.dataset.id;expandedId=expandedId===id?null:id;render()}})});document.querySelectorAll('.card-toggle').forEach(el=>el.addEventListener('click',()=>{expandedId=null;render()}))}function escapeHtml(str=''){return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;")}function resetForm(){editingId=null;els.nameInput.value='';els.cadenceNumberInput.value=1;els.cadenceUnitInput.value='months';els.notesInput.value='';els.saveBtn.textContent='Save in-tray';els.deleteEditBtn.classList.add('hidden')}function showForm(show=true){els.formWrap.classList.toggle('hidden',!show);if(show)els.nameInput.focus()}function startEdit(id){const item=intrays.find(x=>x.id===id);if(!item)return;editingId=id;els.nameInput.value=item.name;els.cadenceNumberInput.value=item.cadenceNumber;els.cadenceUnitInput.value=item.cadenceUnit;els.notesInput.value=item.notes||'';els.saveBtn.textContent='Save changes';els.deleteEditBtn.classList.remove('hidden');showForm(true);window.scrollTo({top:0,behavior:'smooth'})}function saveIntray(){const name=els.nameInput.value.trim(),cadenceNumber=Number(els.cadenceNumberInput.value),cadenceUnit=els.cadenceUnitInput.value,notes=els.notesInput.value.trim();if(!name){alert('Please enter an in-tray name.');return}if(!Number.isFinite(cadenceNumber)||cadenceNumber<1){alert('Cadence number must be 1 or greater.');return}if(editingId){const item=intrays.find(x=>x.id===editingId);if(!item)return;item.name=name;item.cadenceNumber=cadenceNumber;item.cadenceUnit=cadenceUnit;item.notes=notes}else{intrays.push({id:cryptoRandomId(),name,notes,cadenceNumber,cadenceUnit,createdAt:nowISO(),lastClearedAt:null,lastWorkedOnAt:null})}persist();resetForm();showForm(false);render()}function markCleared(id){const item=intrays.find(x=>x.id===id);if(!item)return;item.lastClearedAt=nowISO();item.lastWorkedOnAt=nowISO();expandedId=null;persist();render()}function markWorkedOn(id){const item=intrays.find(x=>x.id===id);if(!item)return;item.lastWorkedOnAt=nowISO();expandedId=null;persist();render()}function deleteCurrentEdit(){if(!editingId)return;const item=intrays.find(x=>x.id===editingId);if(!item)return;if(!confirm(`Delete "${item.name}"?`))return;intrays=intrays.filter(x=>x.id!==editingId);persist();resetForm();showForm(false);render()}function exportBackup(){const backup={app:'in-tray-tracker',version:1,exportedAt:nowISO(),intrays};const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const stamp=new Date().toISOString().slice(0,10);a.href=url;a.download=`in-tray-tracker-backup-${stamp}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}function importBackupFile(file){const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result),imported=Array.isArray(data)?data:data.intrays;if(!Array.isArray(imported))throw new Error('Invalid backup file');const clean=imported.map(x=>({id:x.id||cryptoRandomId(),name:String(x.name||'Untitled in-tray'),notes:String(x.notes||''),cadenceNumber:Number(x.cadenceNumber)||1,cadenceUnit:['days','weeks','months','years'].includes(x.cadenceUnit)?x.cadenceUnit:'months',createdAt:x.createdAt||nowISO(),lastClearedAt:x.lastClearedAt||null,lastWorkedOnAt:x.lastWorkedOnAt||null}));if(!confirm(`Import ${clean.length} in-trays? This will replace your current list.`))return;intrays=clean;persist();resetForm();showForm(false);render();alert('Backup imported.')}catch(e){alert('Could not import backup. Make sure you selected a valid In-Tray Tracker JSON backup file.')}};reader.readAsText(file)}els.toggleFormBtn.addEventListener('click',()=>{const hidden=els.formWrap.classList.contains('hidden');if(hidden){resetForm();showForm(true)}else{showForm(false)}});els.saveBtn.addEventListener('click',saveIntray);els.deleteEditBtn.addEventListener('click',deleteCurrentEdit);els.cancelBtn.addEventListener('click',()=>{resetForm();showForm(false)});els.searchInput.addEventListener('input',render);els.filterStatus.addEventListener('change',render);els.exportBtn.addEventListener('click',exportBackup);els.importBtn.addEventListener('click',()=>els.importFile.click());els.importFile.addEventListener('change',e=>{const file=e.target.files&&e.target.files[0];if(file)importBackupFile(file);els.importFile.value=''});window.addEventListener('scroll',()=>{els.topHeader.classList.toggle('compact',window.scrollY>35)});window.markCleared=markCleared;window.markWorkedOn=markWorkedOn;window.startEdit=startEdit;render();
</script></body></html>
