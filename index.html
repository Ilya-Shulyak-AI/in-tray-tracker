<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050505" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
    <link rel="icon" type="image/png" href="apple-touch-icon.png?v=2" />
    <link rel="shortcut icon" type="image/png" href="apple-touch-icon.png?v=2" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="mobile-bg-fix.css" />
    <link rel="stylesheet" href="readability.css" />
    <title>In-Tray Tracker</title>
  </head>
  <body>
    <div class="wrap">
      <div class="top" id="topHeader">
        <div class="top-inner">
          <h1>In-Tray Tracker</h1>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-row">
          <input id="searchInput" type="text" placeholder="Search" />
          <select id="filterStatus">
            <option value="all">All</option>
            <option value="good">Good</option>
            <option value="warning">Needs Attention</option>
            <option value="overdue">Overdue</option>
          </select>
          <button id="toggleFormBtn">Add</button>
        </div>
      </div>

      <div class="backup">
        <div class="backup-row">
          <button id="undoBtn" class="secondary" disabled>Undo</button>
          <button id="exportBtn" class="secondary">Export Backup</button>
          <button id="importBtn" class="secondary">Import Backup</button>
          <input id="importFile" class="hidden" type="file" accept="application/json,.json" />
        </div>
      </div>

      <div class="form hidden" id="formWrap">
        <div class="form-grid">
          <div class="field">
            <label for="nameInput">In-Tray Name</label>
            <input id="nameInput" type="text" placeholder="Example: Personal Email" maxlength="80" />
          </div>
          <div class="field">
            <label for="cadenceNumberInput">Cadence Number</label>
            <input id="cadenceNumberInput" type="number" min="1" step="1" value="1" />
          </div>
          <div class="field">
            <label for="cadenceUnitInput">Cadence Unit</label>
            <select id="cadenceUnitInput">
              <option value="days">Days</option>
              <option value="business-days">Business Days</option>
              <option value="weeks">Weeks</option>
              <option value="months" selected>Months</option>
              <option value="years">Years</option>
            </select>
          </div>
        </div>

        <div class="field mt-8">
          <label for="notesInput">Notes Optional</label>
          <textarea id="notesInput" placeholder="Anything Helpful To Remember About This In-Tray"></textarea>
        </div>

        <div class="actions mt-8">
          <button id="saveBtn">Save In-Tray</button>
          <button id="deleteEditBtn" class="ghost danger hidden">Delete</button>
          <button id="cancelBtn" class="secondary">Cancel</button>
        </div>
      </div>

      <div class="stats" id="stats" title="Tap To Toggle Counts / Percentages"></div>
      <div class="list" id="list"></div>
      <div class="footer-note">Tap Stats To Toggle Counts/Percentages. Tap An In-Tray To Expand/Collapse. Swipe Left = Fully Cleared. Swipe Right = Worked On.</div>
    </div>

    <script src="app.js"></script>
    <script src="preserve-name-input.js"></script>
  </body>
</html>
