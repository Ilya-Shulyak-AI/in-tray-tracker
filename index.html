<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f5f5f5" />
  <title>In-Tray Tracker</title>
  <style>
    :root{
      --bg:#f5f5f5; --card:#ffffff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --good:#e5e7eb; --warning:#fef3c7; --overdue:#fee2e2;
      --good-text:#374151; --warning-text:#92400e; --overdue-text:#991b1b;
      --accent:#111827; --shadow:0 6px 20px rgba(0,0,0,.06); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.35}
    .wrap{max-width:900px;margin:0 auto;padding:16px 14px 40px}
    .top{position:sticky;top:0;z-index:10;padding-top:max(12px, env(safe-area-inset-top));background:linear-gradient(to bottom, rgba(245,245,245,.98), rgba(245,245,245,.92), rgba(245,245,245,0));backdrop-filter:saturate(180%) blur(8px)}
    h1{margin:4px 0 2px;font-size:1.8rem;font-weight:800;letter-spacing:-.02em}
    .sub{color:var(--muted);margin:0 0 12px;font-size:.96rem}
    .toolbar,.form,.stats{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);margin:12px 0}
    .toolbar,.stats{padding:12px}.toolbar-row,.form-grid{display:grid;gap:10px}.toolbar-row{grid-template-columns:1fr auto auto}.form{padding:14px}.form-grid{grid-template-columns:2fr 1.1fr 1fr}
    .field{display:flex;flex-direction:column;gap:6px}label{font-size:.85rem;color:var(--muted);font-weight:600}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;padding:12px 13px;border:1px solid var(--border);border-radius:14px;background:#fff;color:var(--text);min-height:46px}textarea{min-height:78px;resize:vertical}
    button{border:0;border-radius:14px;min-height:46px;padding:11px 14px;cursor:pointer;background:var(--accent);color:white;font-weight:700}button.secondary{background:white;color:var(--text);border:1px solid var(--border)}button.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}button.small{min-height:38px;padding:8px 12px;font-size:.92rem;border-radius:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:end}.stats{display:grid;gap:10px;grid-template-columns:repeat(4,1fr)}.stat{padding:8px 6px;border-radius:14px;background:#fafafa;border:1px solid var(--border);text-align:center}.stat .num{font-size:1.35rem;font-weight:800}.stat .lbl{font-size:.83rem;color:var(--muted);margin-top:2px}
    .list{display:grid;gap:12px;margin-top:12px}.empty{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);padding:26px 18px;text-align:center;color:var(--muted)}.card{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:20px;overflow:hidden}
    .status-good{background:linear-gradient(to right,var(--good),transparent 70%)}.status-warning{background:linear-gradient(to right,var(--warning),transparent 70%)}.status-overdue{background:linear-gradient(to right,var(--overdue),transparent 70%)}
    .card-top{padding:14px 14px 10px;display:grid;gap:10px}.title-row{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}.title{font-size:1.1rem;font-weight:800;letter-spacing:-.01em}.badge{white-space:nowrap;font-size:.8rem;font-weight:800;padding:7px 10px;border-radius:999px;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.75)}.badge.good{color:var(--good-text)}.badge.warning{color:var(--warning-text)}.badge.overdue{color:var(--overdue-text)}
    .meta{display:grid;gap:8px;grid-template-columns:repeat(2,minmax(0,1fr));font-size:.93rem}.meta-item{background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.05);border-radius:14px;padding:10px 11px}.meta-label{color:var(--muted);font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}.notes{color:#374151;font-size:.95rem;white-space:pre-wrap}.card-actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 14px 14px}.footer-note{margin-top:14px;font-size:.87rem;color:var(--muted);text-align:center}.danger{color:#991b1b}.hidden{display:none!important}
    @media(max-width:720px){.toolbar-row,.form-grid,.stats{grid-template-columns:1fr}.meta{grid-template-columns:1fr}.actions{align-items:stretch}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><h1>In-Tray Tracker</h1><p class="sub">Track when each in-tray was fully cleared, what needs attention next, and what is overdue.</p></div>
    <div class="toolbar"><div class="toolbar-row"><input id="searchInput" type="text" placeholder="Search in-trays" /><select id="filterStatus"><option value="all">All statuses</option><option value="good">Good</option><option value="warning">Warning</option><option value="overdue">Overdue</option></select><button id="toggleFormBtn" class="secondary">Add in-tray</button></div></div>
    <div class="form hidden" id="formWrap"><div class="form-grid"><div class="field"><label for="nameInput">In-tray name</label><input id="nameInput" type="text" placeholder="Example: Personal email" maxlength="80" /></div><div class="field"><label for="cadenceNumberInput">Cadence number</label><input id="cadenceNumberInput" type="number" min="1" step="1" value="1" /></div><div class="field"><label for="cadenceUnitInput">Cadence unit</label><select id="cadenceUnitInput"><option value="days">Days</option><option value="weeks">Weeks</option><option value="months" selected>Months</option><option value="years">Years</option></select></div></div><div class="field" style="margin-top:10px;"><label for="notesInput">Notes (optional)</label><textarea id="notesInput" placeholder="Anything helpful to remember about this in-tray"></textarea></div><div class="actions" style="margin-top:10px;"><button id="saveBtn">Save in-tray</button><button id="cancelBtn" class="secondary">Cancel</button></div></div>
    <div class="stats" id="stats"></div><div class="list" id="list"></div><div class="footer-note">Data is stored locally in this browser on this device.</div>
  </div>
  <script>
    const STORAGE_KEY='in-tray-tracker-v1';
    const els={list:document.getElementById('list'),stats:document.getElementById('stats'),searchInput:document.getElementById('searchInput'),filterStatus:document.getElementById('filterStatus'),toggleFormBtn:document.getElementById('toggleFormBtn'),formWrap:document.getElementById('formWrap'),nameInput:document.getElementById('nameInput'),cadenceNumberInput:document.getElementById('cadenceNumberInput'),cadenceUnitInput:document.getElementById('cadenceUnitInput'),notesInput:document.getElementById('notesInput'),saveBtn:document.getElementById('saveBtn'),cancelBtn:document.getElementById('cancelBtn')};
    let intrays=load();let editingId=null;if(!intrays.length){intrays=seedData();persist()}
    function seedData(){return[makeIntray('Personal email',1,'days','Clear inbox to zero or close to zero.'),makeIntray('Work email',1,'days','Process messages and next actions.'),makeIntray('Physical papers',1,'weeks','Sort, discard, file, or act.'),makeIntray('Downloads folder',1,'months','Rename, file, delete, or act.')]}function makeIntray(name,cadenceNumber,cadenceUnit,notes=''){return{id:cryptoRandomId(),name,notes,cadenceNumber,cadenceUnit,createdAt:new Date().toISOString(),lastClearedAt:null,lastWorkedOnAt:null}}function cryptoRandomId(){return'i_'+Math.random().toString(36).slice(2,11)}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):[]}catch{return[]}}function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify(intrays))}function nowISO(){return new Date().toISOString()}function unitToDays(unit){switch(unit){case'days':return 1;case'weeks':return 7;case'months':return 30.44;case'years':return 365.25;default:return 1}}function cadenceDays(item){return item.cadenceNumber*unitToDays(item.cadenceUnit)}function daysSince(iso){if(!iso)return null;const diffMs=Date.now()-new Date(iso).getTime();return Math.max(0,diffMs/86400000)}function getStatus(item){if(!item.lastClearedAt)return'overdue';const elapsed=daysSince(item.lastClearedAt);const target=cadenceDays(item);if(elapsed<=target)return'good';if(elapsed<=target*2)return'warning';return'overdue'}function statusLabel(status,item){if(!item.lastClearedAt)return'Never cleared';if(status==='good')return'Good';if(status==='warning')return'Needs attention';return'Overdue'}function formatDateTime(iso){if(!iso)return'Not yet';return new Date(iso).toLocaleString([],{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}function formatCadence(item){const n=item.cadenceNumber;const u=item.cadenceUnit;const singular=u.endsWith('s')?u.slice(0,-1):u;return`Every ${n} ${n===1?singular:u}`}function sortIntrays(items){const priority={overdue:0,warning:1,good:2};return[...items].sort((a,b)=>{const sa=getStatus(a);const sb=getStatus(b);if(priority[sa]!==priority[sb])return priority[sa]-priority[sb];const da=a.lastClearedAt?daysSince(a.lastClearedAt):Number.POSITIVE_INFINITY;const db=b.lastClearedAt?daysSince(b.lastClearedAt):Number.POSITIVE_INFINITY;if(db!==da)return db-da;return a.name.localeCompare(b.name)})}function filteredIntrays(){const q=els.searchInput.value.trim().toLowerCase();const statusFilter=els.filterStatus.value;return sortIntrays(intrays).filter(item=>{const text=[item.name,item.notes].join(' ').toLowerCase();const matchesQuery=!q||text.includes(q);const status=getStatus(item);const matchesStatus=statusFilter==='all'||status===statusFilter;return matchesQuery&&matchesStatus})}function renderStats(){const counts={total:intrays.length,good:0,warning:0,overdue:0};for(const item of intrays)counts[getStatus(item)]++;els.stats.innerHTML=`<div class="stat"><div class="num">${counts.total}</div><div class="lbl">Total</div></div><div class="stat"><div class="num">${counts.good}</div><div class="lbl">Good</div></div><div class="stat"><div class="num">${counts.warning}</div><div class="lbl">Needs attention</div></div><div class="stat"><div class="num">${counts.overdue}</div><div class="lbl">Overdue</div></div>`}function render(){renderStats();const items=filteredIntrays();if(!items.length){els.list.innerHTML=`<div class="empty">No in-trays match your current filter.</div>`;return}els.list.innerHTML=items.map(item=>{const status=getStatus(item);const statusText=statusLabel(status,item);const elapsed=item.lastClearedAt?Math.floor(daysSince(item.lastClearedAt)):'—';return`<div class="card status-${status}"><div class="card-top"><div class="title-row"><div class="title">${escapeHtml(item.name)}</div><div class="badge ${status}">${statusText}</div></div><div class="meta"><div class="meta-item"><div class="meta-label">Cadence</div><div>${formatCadence(item)}</div></div><div class="meta-item"><div class="meta-label">Days since full clear</div><div>${elapsed}</div></div><div class="meta-item"><div class="meta-label">Last fully cleared</div><div>${formatDateTime(item.lastClearedAt)}</div></div><div class="meta-item"><div class="meta-label">Last worked on</div><div>${formatDateTime(item.lastWorkedOnAt)}</div></div></div>${item.notes?`<div class="notes">${escapeHtml(item.notes)}</div>`:``}</div><div class="card-actions"><button class="small" onclick="markCleared('${item.id}')">Mark cleared</button><button class="small secondary" onclick="markWorkedOn('${item.id}')">Worked on</button><button class="small secondary" onclick="startEdit('${item.id}')">Edit</button><button class="small ghost danger" onclick="deleteIntray('${item.id}')">Delete</button></div></div>`}).join('')}function escapeHtml(str=''){return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;")}function resetForm(){editingId=null;els.nameInput.value='';els.cadenceNumberInput.value=1;els.cadenceUnitInput.value='months';els.notesInput.value='';els.saveBtn.textContent='Save in-tray'}function showForm(show=true){els.formWrap.classList.toggle('hidden',!show);if(show)els.nameInput.focus()}function startEdit(id){const item=intrays.find(x=>x.id===id);if(!item)return;editingId=id;els.nameInput.value=item.name;els.cadenceNumberInput.value=item.cadenceNumber;els.cadenceUnitInput.value=item.cadenceUnit;els.notesInput.value=item.notes||'';els.saveBtn.textContent='Save changes';showForm(true);window.scrollTo({top:0,behavior:'smooth'})}function saveIntray(){const name=els.nameInput.value.trim();const cadenceNumber=Number(els.cadenceNumberInput.value);const cadenceUnit=els.cadenceUnitInput.value;const notes=els.notesInput.value.trim();if(!name){alert('Please enter an in-tray name.');return}if(!Number.isFinite(cadenceNumber)||cadenceNumber<1){alert('Cadence number must be 1 or greater.');return}if(editingId){const item=intrays.find(x=>x.id===editingId);if(!item)return;item.name=name;item.cadenceNumber=cadenceNumber;item.cadenceUnit=cadenceUnit;item.notes=notes}else{intrays.push({id:cryptoRandomId(),name,notes,cadenceNumber,cadenceUnit,createdAt:nowISO(),lastClearedAt:null,lastWorkedOnAt:null})}persist();resetForm();showForm(false);render()}function markCleared(id){const item=intrays.find(x=>x.id===id);if(!item)return;item.lastClearedAt=nowISO();persist();render()}function markWorkedOn(id){const item=intrays.find(x=>x.id===id);if(!item)return;item.lastWorkedOnAt=nowISO();persist();render()}function deleteIntray(id){const item=intrays.find(x=>x.id===id);if(!item)return;if(!confirm(`Delete "${item.name}"?`))return;intrays=intrays.filter(x=>x.id!==id);persist();render()}els.toggleFormBtn.addEventListener('click',()=>{const hidden=els.formWrap.classList.contains('hidden');if(hidden){resetForm();showForm(true)}else{showForm(false)}});els.saveBtn.addEventListener('click',saveIntray);els.cancelBtn.addEventListener('click',()=>{resetForm();showForm(false)});els.searchInput.addEventListener('input',render);els.filterStatus.addEventListener('change',render);window.markCleared=markCleared;window.markWorkedOn=markWorkedOn;window.startEdit=startEdit;window.deleteIntray=deleteIntray;render();
  </script>
</body>
</html>
